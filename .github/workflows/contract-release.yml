name: Publish contracts

on:
  push:
    tags:
      - "v*"

permissions: # required permissions for the workflow
  id-token: write
  contents: write # in order to create releases
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-payroll-vault:
    name: Release payroll_vault
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@e43b241f114bcf02151c30d61088506c6ad3ae0b
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Quipay smart contract release"
      home_domain: "quipay.app"
      relative_path: '["contracts/payroll_vault"]'
      package: "payroll_vault"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  release-payroll-stream:
    name: Release payroll_stream
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@e43b241f114bcf02151c30d61088506c6ad3ae0b
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Quipay smart contract release"
      home_domain: "quipay.app"
      relative_path: '["contracts/payroll_stream"]'
      package: "payroll_stream"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  release-automation-gateway:
    name: Release automation_gateway
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@e43b241f114bcf02151c30d61088506c6ad3ae0b
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Quipay smart contract release"
      home_domain: "quipay.app"
      relative_path: '["contracts/automation_gateway"]'
      package: "automation_gateway"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  release-workforce-registry:
    name: Release workforce_registry
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@e43b241f114bcf02151c30d61088506c6ad3ae0b
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Quipay smart contract release"
      home_domain: "quipay.app"
      relative_path: '["contracts/workforce_registry"]'
      package: "workforce_registry"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
